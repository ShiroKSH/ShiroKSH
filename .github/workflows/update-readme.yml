name: Update README

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */12 * * *"

permissions:
  contents: write

jobs:
  pr-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Update PR stats
        run: node scripts/update-pr-stats.mjs
        env:
          GITHUB_USERNAME: ShiroKSH
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit README
        run: |
          if git diff --quiet README.md; then
            exit 0
          fi

          git config user.name ShiroKSH
          git config user.email 218489957+ShiroKSH@users.noreply.github.com
          git add README.md
          git commit -m "docs: update profile pr stats"
          git push
